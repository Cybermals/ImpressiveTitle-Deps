name: Build ImpressiveTitle Dependencies
on:
  push:
    branches:
    - main
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Repo
      uses: actions/checkout@v6
    - name: Install Build Dependencies
      run: |
        sudo apt install xorg-dev libgl-dev libglu-dev libfreeimage-dev libfreetype-dev libpulse-dev
        tar -xf Cg-3.1_April2012_x86_64.tgz
        sudo cp -r usr/bin/* /usr/bin/
        sudo cp -r usr/include/* /usr/include/
        sudo cp -r usr/lib64/* /usr/lib64/
        sudo cp -r usr/local/* /usr/local/
    - name: Build Ogre Dependencies
      run: |
        cmake -S ogredeps -B ogredeps-build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=ogre_src_v1-7-4/Dependencies -DOGRDEPS_BUILD_CG=false -DOGREDEPS_BUILD_AMD_QBS=false -DOGREDEPS_BUILD_NVIDIA_NVAPI=false -DOGREDEPS_BUILD_SDL2=false -DOGREDEPS_BUILD_FREEIMAGE=false -DOGREDEPS_BUILD_FREETYPE=false -DOGREDEPS_BUILD_ZLIB=false -DOGREDEPS_BUILD_RAPIDJSON=false -DOGREDEPS_BUILD_REMOTERY=false
        cmake --build ogredeps-build
        cmake --install ogredeps-build
    - name: Build Ogre
      run: |
        cmake -S ogre_src_v1-7-4 -B ogre-build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=Ogre
        cmake --build ogre-build
        cmake --install ogre-build
